name: CI

# Quality gate for LienGuard. Runs on every PR to main and on pushes to main.
# This is the gate that was missing when an incomplete LienStream -> SOV rename
# shipped a workspace that did not typecheck. Keep typecheck + build required.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lienguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Postgres service created above.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/lienguard_test
      # The web + mockup vite configs require PORT/BASE_PATH at config-load time
      # (Replit injects these). Provide them so `build` can run in CI.
      PORT: "19800"
      BASE_PATH: /

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (whole workspace)
        run: pnpm run typecheck

      - name: Build (whole workspace)
        run: pnpm run build

      - name: Push DB schema
        run: pnpm --filter @workspace/db run push

      - name: API tests
        run: pnpm --filter @workspace/api-server run test
